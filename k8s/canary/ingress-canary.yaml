# ============================================================
# Ingress — Canary Split (10% Traffic)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workhub-ingress-canary
  namespace: workhub
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Enable Canary mode
    nginx.ingress.kubernetes.io/canary: "true"
    # Route exactly 10% of traffic to the canary deployment
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  rules:
    - host: api.workhub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workhub-app-service-canary
                port:
                  number: 80
