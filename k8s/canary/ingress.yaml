# ============================================================
# Ingress — Primary Backend
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workhub-ingress
  namespace: workhub
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: api.workhub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workhub-app-service
                port:
                  number: 80
