# ============================================================
# Deployment — Canary (v2)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "workhub-app-canary"
  namespace: "workhub"
  labels:
    app: "workhub-app"
    tier: backend
    version: canary
spec:
  replicas: 1 # Start with 1 replica for the canary
  selector:
    matchLabels:
      app: "workhub-app"
      version: canary
  template:
    metadata:
      labels:
        app: "workhub-app"
        tier: backend
        version: canary
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: "workhub-app"
          image: "workhub-backend:v2" # Use the new version tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: "workhub-app-config"
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "workhub-app-secret"
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "workhub-app-secret"
                  key: DB_PASSWORD
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "workhub-app-secret"
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "workhub-app-secret"
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: "workhub-app-secret"
                  key: JWT_SECRET

          # Actuator Probes ensure traffic isn't routed until the canary is healthy
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
