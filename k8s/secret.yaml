# ============================================================
# Secret — Sensitive credentials (Opaque, base64-encoded)
# Template Placeholders:
#   {{SERVICE_NAME}}  — logical service identifier
#
# IMPORTANT:
#   The values below are base64-encoded PLACEHOLDER defaults.
#   Replace them with real credentials before deploying.
#
#   Encode a value:  echo -n 'my-value' | base64
#
#   For production, prefer:
#     • Sealed Secrets  (Bitnami)
#     • External Secrets Operator  +  OCI Vault / HashiCorp Vault
#     • OCI Vault Provider for Secrets Store CSI Driver
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: "workhub-app-secret"
  namespace: "workhub"
  labels:
    app: "workhub-app"
    tier: backend
type: Opaque
data:
  # echo -n 'postgres' | base64 → cG9zdGdyZXM=
  DB_USERNAME: cG9zdGdyZXM=
  # echo -n 'postgres' | base64 → cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=

  # echo -n 'guest' | base64 → Z3Vlc3Q=
  RABBITMQ_USERNAME: Z3Vlc3Q=
  # echo -n 'guest' | base64 → Z3Vlc3Q=
  RABBITMQ_PASSWORD: Z3Vlc3Q=

  # echo -n '<your-jwt-secret>' | base64
  JWT_SECRET: VTI5dFpWTjFjR1Z5VTJWamNtVjBTMlY1VTI5dFpWTjFjR1Z5VTJWamNtVjBTMlY1TVRJek5EVTI=
