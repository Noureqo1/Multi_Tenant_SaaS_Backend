# ===========================================
# Test Configuration - Uses H2 In-Memory Database
# This avoids PostgreSQL dependency during tests
# ===========================================

spring.application.name=Multi_Tenant_SaaS_Backend_Test

# ===========================================
# H2 In-Memory Database for Tests
# ===========================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===========================================
# JPA / Hibernate Configuration for Tests
# ===========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Default schema for tests
spring.jpa.properties.hibernate.default_schema=public

# ===========================================
# Disable Multi-Tenancy for Basic Tests
# ===========================================
# Note: For integration tests that need multi-tenancy, 
# create separate test profiles

# ===========================================
# JWT Configuration for Tests
# ===========================================
jwt.secret=U29tZVN1cGVyU2VjcmV0S2V5U29tZVN1cGVyU2VjcmV0S2V5MTIzNDU2
jwt.expiration=86400000

# ===========================================
# Logging Configuration for Tests
# ===========================================
logging.level.root=WARN
logging.level.Multi_TenantSaaS.SW452.Project=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN