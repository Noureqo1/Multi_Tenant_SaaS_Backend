spring.application.name=Multi_Tenant_SaaS_Backend


# PostgreSQL DataSource Configuration

spring.datasource.url=jdbc:postgresql://localhost:5432/workhubdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Default schema for shared/public data
spring.jpa.properties.hibernate.default_schema=public


# HikariCP Connection Pool Settings

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000


# Server Configuration

server.port=8082


# JWT Configuration

jwt.secret=U29tZVN1cGVyU2VjcmV0S2V5U29tZVN1cGVyU2VjcmV0S2V5MTIzNDU2
jwt.expiration=86400000
app.tenancy.allow-header-fallback=false

# Logging for Multi-Tenancy Debugging

logging.level.Multi_TenantSaaS.SW452.Project.multitenancy=DEBUG