spring.application.name=Multi_Tenant_SaaS_Backend

# ===========================================
# PostgreSQL DataSource Configuration (Commented out for testing)
# ===========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/workhubdb
# spring.datasource.username=noureqo
# spring.datasource.password=noureqo
# spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# H2 In-Memory DataSource Configuration (Active)
# ===========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Default schema for shared/public data
spring.jpa.properties.hibernate.default_schema=public

# ===========================================
# HikariCP Connection Pool Settings
# ===========================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===========================================
# Server Configuration
# ===========================================
server.port=8082

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=U29tZVN1cGVyU2VjcmV0S2V5U29tZVN1cGVyU2VjcmV0S2V5MTIzNDU2
jwt.expiration=86400000

# ===========================================
# Logging for Multi-Tenancy Debugging
# ===========================================
logging.level.Multi_TenantSaaS.SW452.Project.multitenancy=DEBUG